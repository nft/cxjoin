name: Publish to NPM

on:
  push:
    branches:
      - main

jobs:
  publish:
    name: Build, Test & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for NPM provenance signatures
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build package
        run: bun run build

      - name: Publish to NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Extract version from package.json
          CURRENT_VERSION=$(bun -e "console.log(require('./package.json').version)")
          
          # Check if this version is already published on NPM
          if npm info cxjoin@$CURRENT_VERSION version >/dev/null 2>&1; then
            echo "Version $CURRENT_VERSION is already published on NPM. Skipping publish."
          else
            echo "Publishing version $CURRENT_VERSION to NPM..."
            # Create .npmrc with auth token
            echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
            npm publish --provenance --access public
          fi
